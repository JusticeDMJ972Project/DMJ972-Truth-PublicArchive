<h1>📬 Contactez-nous</h1>
<p>Ce formulaire permet aux citoyens, journalistes ou familles de contribuer, témoigner ou demander des informations.</p>
<form>
  <label for="name">Nom :</label>
  <input type="text" id="name" name="name" placeholder="Votre nom" required>

  <label for="email">Email :</label>
  <input type="email" id="email" name="email" placeholder="Votre email" required>

  <label for="message">Message :</label>
  <textarea id="message" name="message" rows="5" placeholder="Votre message ou témoignage..." required></textarea>

  <button type="submit">Envoyer</button>
</form>
